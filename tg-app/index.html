<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="format-detection" content="telephone=no" />
  <title>Beauty Catalog</title>

  <!-- Telegram WebApp SDK -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <!-- Стили -->
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

  <!-- Главный shell-контейнер -->
  <div id="app-shell"></div>

  <!-- ─── JS: данные и утилиты ────────────────────────────────────────── -->
  <script src="js/data.js"></script>
  <script src="js/tg.js"></script>
  <script src="js/state.js"></script>
  <script src="js/router.js"></script>

  <!-- ─── JS: экраны ─────────────────────────────────────────────────── -->
  <script src="js/screens/catalog.js"></script>
  <script src="js/screens/service.js"></script>
  <script src="js/screens/master.js"></script>
  <script src="js/screens/bookings.js"></script>
  <script src="js/screens/wizard.js"></script>
  <script src="js/screens/search.js"></script>
  <script src="js/screens/success.js"></script>
  <script src="js/screens/portfolio.js"></script>

  <!-- ─── JS: приложение ─────────────────────────────────────────────── -->
  <script src="js/onboarding.js"></script>
  <script src="js/offer.js"></script>

  <script src="js/app.js"></script>

  <!-- Ловим ошибки и показываем на экране -->
  <script>
    window.onerror = function(msg, src, line, col, err) {
      var el = document.getElementById('app-shell');
      if (el) el.innerHTML = '<div style="padding:24px;font-family:sans-serif;color:#e74c3c;background:#fff;min-height:100vh"><b>Ошибка запуска:</b><br><br>' + msg + '<br><br>Файл: ' + src + '<br>Строка: ' + line + '</div>';
    };
  </script>

</body>
</html>
